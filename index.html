<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Samiha 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #ffccff, #ccffff);
  overflow: hidden;
}

button {
  padding: 12px 22px;
  font-size: 18px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

h2, h3 {
  color: #cc0066;
}

.teddy {
  font-size: 120px;
}
</style>
</head>

<body>

<h2 id="question"></h2>

<div id="options">
  <button onclick="answer('yes')">Yes</button>
  <button onclick="answer('no')">No</button>
</div>

<div id="content"></div>

<canvas id="confetti"></canvas>

<script>

// typing effect
function typeText(id, text, speed = 50){
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function typing(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// start
window.onload = function(){
  typeText("question", "Hey Samiha, do you know what today is?", 60);
};

// answer
function answer(choice){
  if(choice === "no"){
    typeText("question", "Come on Samiha... it's your birthday!", 60);
    document.getElementById("options").innerHTML =
      '<button onclick="gift()">Want your gift?</button>';
  } else {
    final();
  }
}

// gift
function gift(){
  document.getElementById("content").innerHTML =
  '<h3>Opening your gift...</h3>' +
  '<div style="font-size:100px">🎁</div><br>' +
  '<button onclick="final()">Open it</button>';
}

// final teddy (NO IMAGE, PURE EMOJI)
function final(){
  typeText("question", "HAPPY BIRTHDAY SAMIHA!", 70);
  document.getElementById("options").innerHTML = "";
  document.getElementById("content").innerHTML =
  '<h2>Your teddy is here!</h2>' +
  '<div class="teddy">🧸</div>';
}

// confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for(let i=0;i<100;i++){
  pieces.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*8+4,
    speed: Math.random()*3+2
  });
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.fillStyle = "hsl(" + Math.random()*360 + ",100%,50%)";
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y += p.speed;
    if(p.y > canvas.height) p.y = 0;
  });
  requestAnimationFrame(update);
}
update();

</script>

</body>
</html>
