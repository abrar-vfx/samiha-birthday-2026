<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Samiha 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #ffccff, #ccffff);
  overflow: hidden;
}

button {
  padding: 12px 22px;
  font-size: 18px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

h2, h3 {
  color: #cc0066;
}

.teddy {
  font-size: 120px;
}
</style>
</head>

<body>

<h2 id="question"></h2>

<div id="options">
  <button onclick="answer('yes')">Yes</button>
  <button onclick="answer('no')">No</button>
</div>

<div id="content"></div>

<canvas id="confetti"></canvas>

<script>

// typing effect
function typeText(id, text, speed = 50){
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";

  function typing(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// start
window.onload = function(){
  typeText("question", "Hey Samiha, do you know what today is?", 60);
};

// answer
function answer(choice){
  if(choice === "no"){
    typeText("question", "Come on Samiha... it's your birthday!", 60);
    document.getElementById("options").innerHTML =
      '<button onclick="gift()">Want your gift?</button>';
  } else {
    final();
  }
}

// gift
function gift(){
  document.getElementById("content").innerHTML =
  '<h3>Opening your gift...</h3>' +
  '<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Gift_box_icon.png/512px-Gift_box_icon.png" width="150"><br><br>' +
  '<button onclick="final()">Open it</button>';
}

  typeText("question", "HAPPY BIRTHDAY SAMIHA!", 70);
